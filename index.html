<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --navy:    #07142b;
      --gold:    #f0c040;
      --white:   #f5f5f0;
      --muted:   #8ba09a;
      --card:    #0e2a3a;
      --p0: #FF5252;  --p1: #00BCD4;  --p2: #FFD54F;
      --p3: #26C6DA;  --p4: #F06292;  --p5: #AB47BC;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--navy); color: var(--white); font-family: 'Poppins', sans-serif; min-height: 100vh; }
    header { background: linear-gradient(160deg, #0a3d1f 0%, var(--navy) 65%); border-bottom: 2px solid var(--gold); padding: 40px 20px; text-align: center; }
    h1 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 700; }
    h1 span { color: var(--gold); }
    main { max-width: 1100px; margin: 40px auto; padding: 0 20px 80px; }
    .section-title { font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 700; margin: 30px 0 20px; }
    
    .tab-nav { display: flex; gap: 4px; margin-bottom: 20px; background: var(--card); border: 1px solid rgba(240,192,64,0.18); border-radius: 12px; padding: 6px; }
    .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; background: transparent; color: var(--muted); cursor: pointer; font-size: 0.9rem; font-weight: 600; }
    .tab-btn.active { background: var(--gold); color: #000; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
    .group-card { background: var(--card); border: 1px solid rgba(240,192,64,0.18); border-radius: 12px; overflow: hidden; }
    .group-header { padding: 14px 18px; background: rgba(240,192,64,0.12); border-bottom: 1px solid rgba(240,192,64,0.18); cursor: pointer; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .group-label { font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); }
    .group-teams { font-size: 0.75rem; color: var(--muted); flex: 1; }
    .group-pickers { display: flex; gap: 6px; flex-wrap: wrap; }
    .picker-badge { font-size: 0.7rem; font-family: 'IBM Plex Mono', monospace; color: var(--white); padding: 4px 12px; border-radius: 14px; font-weight: 700; }
    .picker-badge.p0 { background: var(--p0); } .picker-badge.p1 { background: var(--p1); } .picker-badge.p2 { background: var(--p2); }
    .picker-badge.p3 { background: var(--p3); } .picker-badge.p4 { background: var(--p4); } .picker-badge.p5 { background: var(--p5); }

    .group-matches { display: none; padding: 18px; background: linear-gradient(135deg, rgba(10,61,31,0.15), rgba(14,42,58,0.2)); }
    .group-card.open .group-matches { display: block; }

    .standings-wrapper { margin-bottom: 18px; border: 1px solid rgba(240,192,64,0.2); border-radius: 10px; overflow: hidden; background: rgba(240,192,64,0.06); }
    .standings-title { padding: 12px 16px; background: rgba(240,192,64,0.18); font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--gold); }
    .standings-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    .standings-table th { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; padding: 10px 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.08); color: var(--muted); font-weight: 500; }
    .standings-table th:first-child { text-align: left; padding-left: 16px; }
    .standings-table td { padding: 8px 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .standings-table td:first-child { text-align: left; padding-left: 16px; font-weight: 600; }
    .standings-table tbody tr:nth-child(1) td, .standings-table tbody tr:nth-child(2) td { color: var(--gold); }

    .matches-label { font-size: 0.75rem; color: var(--gold); font-family: 'Outfit', sans-serif; font-weight: 700; text-transform: uppercase; margin: 10px 0; display: block; }
    .matches-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .match-group { display: flex; flex-direction: column; gap: 8px; }
    .match-single { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; }
    .match-single:hover { background: rgba(255,255,255,0.1); border-color: rgba(240,192,64,0.3); }
    .match-date-time { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--gold); margin-bottom: 6px; font-weight: 700; }
    .match-teams { display: flex; align-items: center; justify-content: space-between; gap: 6px; font-size: 0.8rem; font-weight: 600; }
    .team-name-sm { flex: 1; }
    .team-name-sm.home { text-align: right; }
    .team-name-sm.away { text-align: left; }
    .score-box { font-family: 'Outfit', sans-serif; font-size: 0.9rem; color: var(--gold); background: rgba(240,192,64,0.2); border: 1px solid rgba(240,192,64,0.4); border-radius: 6px; padding: 3px 8px; min-width: 44px; font-weight: 700; }

    .rules-box { background: linear-gradient(135deg, rgba(15,92,46,0.3), rgba(7,20,43,0.6)); border: 1px solid rgba(240,192,64,0.3); border-radius: 12px; padding: 18px; margin: 20px 0; font-size: 0.88rem; line-height: 1.7; }
    .rules-box strong { color: var(--gold); }

    /* 참가자 카드 */
    .participants-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin: 20px 0; }
    .participant-card { background: var(--card); border: 2px solid rgba(240,192,64,0.18); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .participant-header { display: flex; align-items: center; justify-content: space-between; }
    .participant-name { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 700; }
    .participant-alive-count { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted); }
    .participant-alive-count span { color: #4ade80; font-weight: 700; }

    /* 조별 팀 목록 */
    .participant-group-section { display: flex; flex-direction: column; gap: 6px; }
    .participant-group-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--gold); font-weight: 700; letter-spacing: 0.08em; margin-bottom: 2px; }
    .team-chips { display: flex; flex-wrap: wrap; gap: 6px; }

    /* 팀 칩 */
    .team-chip { font-size: 0.75rem; font-family: 'Poppins', sans-serif; font-weight: 600; padding: 5px 12px; border-radius: 20px; border: 1px solid; transition: all 0.3s; white-space: nowrap; }
    /* 생존 */
    .team-chip.alive { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.4); color: #4ade80; }
    /* 아직 결정 안됨 (조별리그 전) */
    .team-chip.pending { background: rgba(240,192,64,0.08); border-color: rgba(240,192,64,0.25); color: var(--white); }
    /* 탈락 */
    .team-chip.eliminated { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.08); color: rgba(255,255,255,0.25); text-decoration: line-through; }

    footer { text-align: center; padding: 24px; font-size: 0.75rem; color: var(--muted); border-top: 1px solid rgba(255,255,255,0.07); }
    @media (max-width: 640px) { .matches-grid { grid-template-columns: 1fr; } }
  </style>
</head>

            <span class="group-teams">${g.teams.join(' · ')}</span>
            ${badges?`<div class="group-pickers">${badges}</div>`:''}
            <span style="color:var(--gold);">▼</span>
          </div>
          <div class="group-matches">
            <div class="standings-wrapper">
              <div class="standings-title">📊 조별 순위</div>
              <table class="standings-table">
                <thead><tr><th>팀</th><th>경기</th><th>승</th><th>무</th><th>패</th><th>득실</th><th>점</th></tr></thead>
                <tbody>
                  ${g.teams.map((t,i)=>`<tr><td>${i+1} ${t}</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td><b>-</b></td></tr>`).join('')}
                </tbody>
              </table>
            </div>
            <span class="matches-label">⚽ 경기 일정</span>
            <div class="matches-grid">
              <div class="match-group">${renderMatches(matchesCol1)}</div>
              <div class="match-group">${renderMatches(matchesCol2)}</div>
            </div>
          </div>
        </div>`;
      }).join('');
      document.getElementById('group-grid').innerHTML = html;
    }

    /* ================================================================
       생존팀 추적
       - eliminatedTeams: 탈락이 확정된 팀 이름 Set
       - advancedTeams: 조별리그 통과가 확정된 팀 이름 Set
       - 비어있으면 아직 시작 전 → 모든 팀 pending 상태
       API 연동 시 이 두 Set을 채워주면 자동으로 반영됨
    ================================================================ */
    const eliminatedTeams = new Set(); // 탈락팀 (예: new Set(['멕시코', '브라질']))
    const advancedTeams   = new Set(); // 진출확정팀

    function getTeamStatus(teamName) {
      if (eliminatedTeams.has(teamName)) return 'eliminated';
      if (advancedTeams.has(teamName))   return 'alive';
      return 'pending'; // 아직 미결정
    }

    function renderParticipants() {
      const html = PARTICIPANTS.map(p => {
        // 각 조에서 생존 중인 팀 수 계산
        let aliveCount = 0, totalCount = 0;
        p.groups.forEach(gid => {
          const g = GROUPS.find(g => g.id === gid);
          if (!g) return;
          g.teams.forEach(t => {
            totalCount++;
            if (getTeamStatus(t) !== 'eliminated') aliveCount++;
          });
        });

        const groupSections = p.groups.map(gid => {
          const g = GROUPS.find(g => g.id === gid);
          if (!g) return '';
          const chips = g.teams.map(t => {
            const status = getTeamStatus(t);
            return `<span class="team-chip ${status}">${t}</span>`;
          }).join('');
          return `
            <div class="participant-group-section">
              <div class="participant-group-label">📌 ${gid}조</div>
              <div class="team-chips">${chips}</div>
            </div>`;
        }).join('');

        // 탈락팀이 하나라도 있으면 카운트 표시
        const showCount = eliminatedTeams.size > 0 || advancedTeams.size > 0;
        const countHtml = showCount
          ? `<div class="participant-alive-count">생존 <span>${aliveCount}</span> / ${totalCount}팀</div>`
          : '';

        return `<div class="participant-card">
          <div class="participant-header">
            <div class="participant-name">${p.name}</div>
            ${countHtml}
          </div>
          ${groupSections}
        </div>`;
      }).join('');
      document.getElementById('participants-grid').innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded',()=>{
      renderGroups();
      renderParticipants();
    });
  </script>
</body>
</html>
