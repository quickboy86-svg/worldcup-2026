<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <title>2026 월드컵 일정 & 조 예측 게임</title>

  <style>
    :root {
      --navy:    #07142b;
      --gold:    #f0c040;
      --white:   #f5f5f0;
      --muted:   #8ba09a;
      --card:    #0e2a3a;
      --p0: #FF5252;  --p1: #00BCD4;  --p2: #FFD54F;
      --p3: #26C6DA;  --p4: #F06292;  --p5: #AB47BC;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--navy); color: var(--white); font-family: 'Poppins', sans-serif; min-height: 100vh; }
    header { background: linear-gradient(160deg, #0a3d1f 0%, var(--navy) 65%); border-bottom: 2px solid var(--gold); padding: 40px 20px; text-align: center; }
    h1 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 700; }
    h1 span { color: var(--gold); }

    /* 상태 표시바 */
    .status-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 20px; background: rgba(0,0,0,0.3); font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--muted); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
    .status-dot.live { background: #4ade80; box-shadow: 0 0 6px #4ade80; animation: pulse 1.5s infinite; }
    .status-dot.ok   { background: #4ade80; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    main { max-width: 1100px; margin: 40px auto; padding: 0 20px 80px; }
    .section-title { font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 700; margin: 30px 0 20px; }
    
    .tab-nav { display: flex; gap: 4px; margin-bottom: 20px; background: var(--card); border: 1px solid rgba(240,192,64,0.18); border-radius: 12px; padding: 6px; }
    .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; background: transparent; color: var(--muted); cursor: pointer; font-size: 0.9rem; font-weight: 600; }
    .tab-btn.active { background: var(--gold); color: #000; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
    .group-card { background: var(--card); border: 1px solid rgba(240,192,64,0.18); border-radius: 12px; overflow: hidden; }
    .group-header { padding: 14px 18px; background: rgba(240,192,64,0.12); border-bottom: 1px solid rgba(240,192,64,0.18); cursor: pointer; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .group-label { font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); }
    .group-teams { font-size: 0.75rem; color: var(--muted); flex: 1; }
    .group-pickers { display: flex; gap: 6px; flex-wrap: wrap; }
    .picker-badge { font-size: 0.7rem; font-family: 'IBM Plex Mono', monospace; color: var(--white); padding: 4px 12px; border-radius: 14px; font-weight: 700; }
    .picker-badge.p0 { background: var(--p0); } .picker-badge.p1 { background: var(--p1); } .picker-badge.p2 { background: var(--p2); }
    .picker-badge.p3 { background: var(--p3); } .picker-badge.p4 { background: var(--p4); } .picker-badge.p5 { background: var(--p5); }

    .group-matches { display: none; padding: 18px; background: linear-gradient(135deg, rgba(10,61,31,0.15), rgba(14,42,58,0.2)); }
    .group-card.open .group-matches { display: block; }

    .standings-wrapper { margin-bottom: 18px; border: 1px solid rgba(240,192,64,0.2); border-radius: 10px; overflow: hidden; background: rgba(240,192,64,0.06); }
    .standings-title { padding: 12px 16px; background: rgba(240,192,64,0.18); font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--gold); }
    .standings-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    .standings-table th { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; padding: 10px 6px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.08); color: var(--muted); font-weight: 500; white-space: nowrap; }
    .standings-table th:first-child { text-align: left; padding-left: 16px; }
    .standings-table td { padding: 8px 6px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .standings-table td:first-child { text-align: left; padding-left: 16px; font-weight: 600; }
    .standings-table tbody tr:nth-child(1) td, .standings-table tbody tr:nth-child(2) td { color: var(--gold); }

    .matches-label { font-size: 0.75rem; color: var(--gold); font-family: 'Outfit', sans-serif; font-weight: 700; text-transform: uppercase; margin: 10px 0; display: block; }
    .matches-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .match-group { display: flex; flex-direction: column; gap: 8px; }
    .match-single { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; }
    .match-single:hover { background: rgba(255,255,255,0.1); border-color: rgba(240,192,64,0.3); }
    .match-date-time { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--gold); margin-bottom: 6px; font-weight: 700; }
    .match-teams { display: flex; align-items: center; justify-content: space-between; gap: 6px; font-size: 0.8rem; font-weight: 600; }
    .team-name-sm { flex: 1; }
    .team-name-sm.home { text-align: right; }
    .team-name-sm.away { text-align: left; }
    .score-box { font-family: 'Outfit', sans-serif; font-size: 0.9rem; color: var(--gold); background: rgba(240,192,64,0.2); border: 1px solid rgba(240,192,64,0.4); border-radius: 6px; padding: 3px 8px; min-width: 44px; font-weight: 700; text-align: center; }
    .score-box.live { color: #4ade80; background: rgba(74,222,128,0.15); border-color: rgba(74,222,128,0.4); animation: pulse 1.5s infinite; }

    .rules-box { background: linear-gradient(135deg, rgba(15,92,46,0.3), rgba(7,20,43,0.6)); border: 1px solid rgba(240,192,64,0.3); border-radius: 12px; padding: 18px; margin: 20px 0; font-size: 0.88rem; line-height: 1.7; }
    .rules-box strong { color: var(--gold); }

    /* 참가자 카드 */
    .participants-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin: 20px 0; }
    .participant-card { background: var(--card); border: 2px solid rgba(240,192,64,0.18); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .participant-header { display: flex; align-items: center; justify-content: space-between; }
    .participant-name { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 700; }
    .participant-alive-count { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted); }
    .participant-alive-count span { color: #4ade80; font-weight: 700; }

    /* 조별 팀 목록 */
    .participant-group-section { display: flex; flex-direction: column; gap: 6px; }
    .participant-group-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--gold); font-weight: 700; letter-spacing: 0.08em; margin-bottom: 2px; }
    .team-chips { display: flex; flex-wrap: wrap; gap: 6px; }

    /* 팀 칩 */
    .team-chip { font-size: 0.75rem; font-family: 'Poppins', sans-serif; font-weight: 600; padding: 5px 12px; border-radius: 20px; border: 1px solid; transition: all 0.3s; white-space: nowrap; }
    /* 생존 */
    .team-chip.alive { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.4); color: #4ade80; }
    /* 아직 결정 안됨 (조별리그 전) */
    .team-chip.pending { background: rgba(240,192,64,0.08); border-color: rgba(240,192,64,0.25); color: var(--white); }
    /* 탈락 */
    .team-chip.eliminated { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.08); color: rgba(255,255,255,0.25); text-decoration: line-through; }

    footer { text-align: center; padding: 24px; font-size: 0.75rem; color: var(--muted); border-top: 1px solid rgba(255,255,255,0.07); }
    @media (max-width: 640px) { .matches-grid { grid-template-columns: 1fr; } }
  </style>
</head>

      if(card) card.classList.toggle('open');
    }

    let refreshTimer = null;

    /* ================================================================
       시간 유틸
    ================================================================ */
    function hasMatchToday(matches) {
      const today = new Date().toDateString();
      return matches.some(m => new Date(m.utcDate).toDateString() === today);
    }

    function hasLiveMatch(matches) {
      return matches.some(m => m.status === 'IN_PLAY' || m.status === 'PAUSED');
    }

    function getRefreshInterval(matches) {
      if (hasLiveMatch(matches))   return 60 * 1000;
      if (hasMatchToday(matches))  return 5 * 60 * 1000;
      return 60 * 60 * 1000;
    }

    function setStatusBar(state, text) {
      const dot  = document.getElementById('status-dot');
      const span = document.getElementById('status-text');
      if (!dot || !span) return;
      dot.className  = 'status-dot' + (state === 'live' ? ' live' : state === 'ok' ? ' ok' : '');
      span.textContent = text;
    }

    const TEAM_NAME_KO = {
      'Algeria':'알제리','Argentina':'아르헨티나','Australia':'호주','Austria':'오스트리아',
      'Belgium':'벨기에','Bosnia-H.':'보스니아 헤르체고비나','Bosnia-Herzegovina':'보스니아 헤르체고비나',
      'Brazil':'브라질','Canada':'캐나다','Cape Verde':'카보베르데','Cape Verde Islands':'카보베르데',
      'Colombia':'콜롬비아','Congo DR':'콩고민주공화국','Croatia':'크로아티아',
      'Curaçao':'큐라소','Czechia':'체코','Ecuador':'에콰도르','Egypt':'이집트',
      'England':'잉글랜드','France':'프랑스','Germany':'독일','Ghana':'가나',
      'Haiti':'아이티','Iran':'이란','Iraq':'이라크','Ivory Coast':'코트디부아르',
      'Japan':'일본','Jordan':'요르단','Korea Republic':'대한민국','South Korea':'대한민국',
      'Mexico':'멕시코','Morocco':'모로코','Netherlands':'네덜란드','New Zealand':'뉴질랜드',
      'Norway':'노르웨이','Panama':'파나마','Paraguay':'파라과이','Portugal':'포르투갈',
      'Qatar':'카타르','Saudi Arabia':'사우디아라비아','Scotland':'스코틀랜드',
      'Senegal':'세네갈','South Africa':'남아프리카','Spain':'스페인','Sweden':'스웨덴',
      'Switzerland':'스위스','Tunisia':'튀니지','Turkey':'터키','Türkiye':'터키',
      'USA':'미국','United States':'미국','Uruguay':'우루과이','Uzbekistan':'우즈베키스탄',
    };
    function toKo(team) {
      return TEAM_NAME_KO[team?.shortName] || TEAM_NAME_KO[team?.name] || team?.shortName || team?.name || '?';
    }
    function fmtKST(utcDate) {
      const d = new Date(new Date(utcDate).getTime() + 9 * 3600 * 1000);
      const days = ['일','월','화','수','목','금','토'];
      const M  = d.getUTCMonth() + 1;
      const D  = d.getUTCDate();
      const dw = days[d.getUTCDay()];
      const H  = String(d.getUTCHours()).padStart(2,'0');
      const mi = String(d.getUTCMinutes()).padStart(2,'0');
      return `${M}/${D}(${dw}) ${H}:${mi}`;
    }

    /* ================================================================
       데이터 로드 (GitHub Actions가 생성한 api-data.json 사용)
    ================================================================ */
    async function fetchFromAPI() {
      const res = await fetch('api-data.json?_=' + Date.now());
      if (!res.ok) throw new Error(`api-data.json 로드 실패 (${res.status})`);
      const data = await res.json();
      return { standings: data.standings, matches: data.matches, updatedAt: data.updatedAt };
    }

    /* ================================================================
       생존팀 계산
       - 조별리그: 각 조 1위·2위 + 3위 중 상위 8팀 진출 (총 32팀)
       - 토너먼트: 매 라운드 패자 탈락
    ================================================================ */
    function calcSurvival(standingsData, allMatches) {
      eliminatedTeams.clear();
      advancedTeams.clear();

      const groupStandings = standingsData.standings || [];

      // ── 조별리그 완료된 조 처리 ──
      const thirdPlacers = []; // { team, points, gd, gf }
      groupStandings.forEach(gs => {
        const table = gs.table || [];
        if (!table.length) return;
        const gsGroupKey = gs.group?.replace('Group ', 'GROUP_');

        const groupMatches = allMatches.filter(
          m => m.stage === 'GROUP_STAGE' && m.group === gsGroupKey
        );
        const allFinished = groupMatches.length > 0 &&
          groupMatches.every(m => m.status === 'FINISHED');

        if (allFinished) {
          if (table[0]) advancedTeams.add(toKo(table[0].team));
          if (table[1]) advancedTeams.add(toKo(table[1].team));
          if (table[2]) thirdPlacers.push({
            name: toKo(table[2].team),
            points: table[2].points,
            gd: table[2].goalDifference,
            gf: table[2].goalsFor
          });
          if (table[3]) eliminatedTeams.add(toKo(table[3].team));
        }
      });

      // 3위 중 상위 8팀 진출 (12개 조 모두 완료됐을 때)
      if (thirdPlacers.length === 12) {
        thirdPlacers.sort((a,b) =>
          b.points - a.points || b.gd - a.gd || b.gf - a.gf
        );
        thirdPlacers.slice(0, 8).forEach(t => advancedTeams.add(t.name));
        thirdPlacers.slice(8).forEach(t  => eliminatedTeams.add(t.name));
      }

      // ── 토너먼트 단계 처리 ──
      const KO_STAGES = ['LAST_32','LAST_16','QUARTER_FINALS','SEMI_FINALS','FINAL'];
      KO_STAGES.forEach(stage => {
        allMatches
          .filter(m => m.stage === stage && m.status === 'FINISHED')
          .forEach(m => {
            const hs = m.score?.fullTime?.home ?? 0;
            const as = m.score?.fullTime?.away ?? 0;
            const homeTeam = toKo(m.homeTeam);
            const awayTeam = toKo(m.awayTeam);
            if (hs > as) { eliminatedTeams.add(awayTeam); advancedTeams.add(homeTeam); }
            if (as > hs) { eliminatedTeams.add(homeTeam); advancedTeams.add(awayTeam); }
          });
      });
    }

    /* ================================================================
       API 데이터로 그룹 화면 업데이트
    ================================================================ */
    function applyAPIData(standingsData, allMatches) {
      const groupStandings = standingsData.standings || [];

      groupStandings.forEach(gs => {
        const letter = gs.group?.replace('Group ', '');
        const groupEl = document.getElementById(`gc-${letter}`);
        if (!groupEl) return;

        const tbody = groupEl.querySelector('.standings-table tbody');
        if (tbody && gs.table?.length) {
          tbody.innerHTML = gs.table.map((row, i) => `
            <tr>
              <td>${i+1} ${toKo(row.team)}</td>
              <td>${row.playedGames}</td>
              <td>${row.won}</td>
              <td>${row.draw}</td>
              <td>${row.lost}</td>
              <td>${row.goalDifference > 0 ? '+' + row.goalDifference : row.goalDifference}</td>
              <td><b>${row.points}</b></td>
            </tr>`).join('');
        }

        const groupMatches = allMatches.filter(
          m => m.stage === 'GROUP_STAGE' && m.group === `GROUP_${letter}`
        );
        const matchesGrid = groupEl.querySelector('.matches-grid');
        if (matchesGrid && groupMatches.length) {
          const col1 = groupMatches.slice(0, 3);
          const col2 = groupMatches.slice(3);
          const renderMatch = m => {
            const s = m.status;
            const h = m.score?.fullTime?.home;
            const a = m.score?.fullTime?.away;
            let scoreHtml;
            if (s === 'FINISHED') {
              scoreHtml = `<span class="score-box">${h} - ${a}</span>`;
            } else if (s === 'IN_PLAY' || s === 'PAUSED') {
              const ch = m.score?.currentPeriod?.home ?? '?';
              const ca = m.score?.currentPeriod?.away ?? '?';
              scoreHtml = `<span class="score-box live">${ch} - ${ca} 🔴</span>`;
            } else {
              scoreHtml = `<span class="score-box">-</span>`;
            }
            const kst  = fmtKST(m.utcDate);
            const home = toKo(m.homeTeam);
            const away = toKo(m.awayTeam);
            return `<div class="match-single">
              <div class="match-date-time">${kst} KST</div>
              <div class="match-teams">
                <span class="team-name-sm home">${home}</span>
                ${scoreHtml}
                <span class="team-name-sm away">${away}</span>
              </div>
            </div>`;
          };
          matchesGrid.innerHTML = `
            <div class="match-group">${col1.map(renderMatch).join('')}</div>
            <div class="match-group">${col2.map(renderMatch).join('')}</div>`;
        }
      });

      calcSurvival(standingsData, allMatches);
      renderParticipants();
    }

    /* ================================================================
       메인 로드 함수
    ================================================================ */
    async function loadData() {
      if (refreshTimer) clearTimeout(refreshTimer);

      try {
        setStatusBar('loading', '데이터 불러오는 중…');
        const { standings, matches, updatedAt } = await fetchFromAPI();
        const allMatches = matches.matches || [];

        applyAPIData(standings, allMatches);

        const live = hasLiveMatch(allMatches);
        const today = hasMatchToday(allMatches);
        const interval = getRefreshInterval(allMatches);
        const nextStr = live ? '1분' : today ? '5분' : '1시간';
        const dataKst = updatedAt
          ? new Date(updatedAt).toLocaleTimeString('ko-KR', { timeZone: 'Asia/Seoul' })
          : new Date().toLocaleTimeString('ko-KR', { timeZone: 'Asia/Seoul' });

        setStatusBar(live ? 'live' : 'ok',
          `${live ? '🔴 라이브 ' : ''}데이터 기준: ${dataKst} KST · ${nextStr}마다 갱신`);

        refreshTimer = setTimeout(loadData, interval);

      } catch (err) {
        console.error(err);
        setStatusBar('error', `⚠️ 데이터 로드 오류: ${err.message} · 5분 후 재시도`);
        refreshTimer = setTimeout(loadData, 5 * 60 * 1000);
      }
    }

    function renderGroups() {
      const html = GROUPS.map(g=>{
        const pickerIdx = PARTICIPANTS.map((p,i)=>p.groups.includes(g.id)?i:-1).filter(i=>i>=0);
        const badges = pickerIdx.map(i=>`<span class="picker-badge p${i}">${PARTICIPANTS[i].name}</span>`).join('');
        const matchesCol1 = g.matches.slice(0,3);
        const matchesCol2 = g.matches.slice(3);
        const renderMatches = list => list.map(m=>`
          <div class="match-single">
            <div class="match-date-time">${m.date} KST</div>
            <div class="match-teams">
              <span class="team-name-sm home">${m.home}</span>
              <span class="score-box">-</span>
              <span class="team-name-sm away">${m.away}</span>
            </div>
          </div>`).join('');
        return `<div class="group-card" id="gc-${g.id}">
          <div class="group-header" onclick="toggleGroup('${g.id}')">
            <span class="group-label">${g.id}조</span>
            <span class="group-teams">${g.teams.join(' · ')}</span>
            ${badges?`<div class="group-pickers">${badges}</div>`:''}
            <span style="color:var(--gold);">▼</span>
          </div>
          <div class="group-matches">
            <div class="standings-wrapper">
              <div class="standings-title">📊 조별 순위</div>
              <table class="standings-table">
                <thead><tr><th>팀</th><th>경기</th><th>승</th><th>무</th><th>패</th><th>득실</th><th>승점</th></tr></thead>
                <tbody>
                  ${g.teams.map((t,i)=>`<tr><td>${i+1} ${t}</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td><b>-</b></td></tr>`).join('')}
                </tbody>
              </table>
            </div>
            <span class="matches-label">⚽ 경기 일정</span>
            <div class="matches-grid">
              <div class="match-group">${renderMatches(matchesCol1)}</div>
              <div class="match-group">${renderMatches(matchesCol2)}</div>
            </div>
          </div>
        </div>`;
      }).join('');
      document.getElementById('group-grid').innerHTML = html;
    }

    /* ================================================================
       생존팀 추적
       - eliminatedTeams: 탈락이 확정된 팀 이름 Set
       - advancedTeams: 조별리그 통과가 확정된 팀 이름 Set
       - 비어있으면 아직 시작 전 → 모든 팀 pending 상태
       API 연동 시 이 두 Set을 채워주면 자동으로 반영됨
    ================================================================ */
    const eliminatedTeams = new Set(); // 탈락팀 (예: new Set(['멕시코', '브라질']))
    const advancedTeams   = new Set(); // 진출확정팀

    function getTeamStatus(teamName) {
      if (eliminatedTeams.has(teamName)) return 'eliminated';
      if (advancedTeams.has(teamName))   return 'alive';
      return 'pending'; // 아직 미결정
    }

    function renderParticipants() {
      const html = PARTICIPANTS.map(p => {
        // 각 조에서 생존 중인 팀 수 계산
        let aliveCount = 0, totalCount = 0;
        p.groups.forEach(gid => {
          const g = GROUPS.find(g => g.id === gid);
          if (!g) return;
          g.teams.forEach(t => {
            totalCount++;
            if (getTeamStatus(t) !== 'eliminated') aliveCount++;
          });
        });

        const groupSections = p.groups.map(gid => {
          const g = GROUPS.find(g => g.id === gid);
          if (!g) return '';
          const chips = g.teams.map(t => {
            const status = getTeamStatus(t);
            return `<span class="team-chip ${status}">${t}</span>`;
          }).join('');
          return `
            <div class="participant-group-section">
              <div class="participant-group-label">📌 ${gid}조</div>
              <div class="team-chips">${chips}</div>
            </div>`;
        }).join('');

        // 탈락팀이 하나라도 있으면 카운트 표시
        const showCount = eliminatedTeams.size > 0 || advancedTeams.size > 0;
        const countHtml = showCount
          ? `<div class="participant-alive-count">생존 <span>${aliveCount}</span> / ${totalCount}팀</div>`
          : '';

        return `<div class="participant-card">
          <div class="participant-header">
            <div class="participant-name">${p.name}</div>
            ${countHtml}
          </div>
          ${groupSections}
        </div>`;
      }).join('');
      document.getElementById('participants-grid').innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderGroups();
      renderParticipants();
      loadData(); // 개막 전이면 카운트다운, 이후면 API 호출
    });
  </script>
